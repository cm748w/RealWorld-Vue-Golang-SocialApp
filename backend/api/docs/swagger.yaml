basePath: /
definitions:
  models.CommentPost:
    properties:
      value:
        description: 评论内容，必填
        type: string
    required:
    - value
    type: object
  models.CreateOrUpdatePost:
    properties:
      message:
        description: Message      string `json:"message" bson:"message" validate:"required,min=5"`
          // 内容，必填，最少5个字符
        type: string
      selectedFile:
        description: 选中的文件URL
        type: string
      title:
        description: 标题，必填
        type: string
    required:
    - message
    - title
    type: object
  models.CreateUser:
    properties:
      email:
        description: 邮箱
        type: string
      firstName:
        description: 名
        type: string
      lastName:
        description: 姓
        type: string
      password:
        description: 密码
        type: string
    type: object
  models.IError:
    properties:
      field:
        description: 错误字段
        type: string
      tag:
        description: 错误标签
        type: string
    type: object
  models.LoginUser:
    properties:
      email:
        description: 邮箱
        type: string
      password:
        description: 密码
        type: string
    type: object
  models.Message:
    properties:
      _id:
        description: 消息ID
        type: string
      content:
        description: 消息内容
        type: string
      receiver:
        description: 接收者ID
        type: string
      sender:
        description: 发送者ID
        type: string
    type: object
  models.PostModel:
    properties:
      _id:
        description: 帖子ID
        type: string
      comments:
        description: 评论列表
        items:
          type: string
        type: array
      createdAt:
        description: 创建时间
        type: string
      creator:
        description: 创建者ID
        type: string
      likes:
        description: 点赞列表
        items:
          type: string
        type: array
      message:
        description: Message      string             `json:"message" bson:"message"
          validate:"required,min=5"` // 内容，必填，最少5个字符
        type: string
      name:
        description: 创建者名称
        type: string
      selectedFile:
        description: 选中的文件URL
        type: string
      title:
        description: 标题，必填
        type: string
    required:
    - message
    - title
    type: object
  models.SendMessageM:
    properties:
      content:
        description: Content  string `json:"content" bson:"content" validate:"required,min=5"`
          // 消息内容，必填，最少5个字符
        type: string
      receiver:
        description: 接收者ID，必填
        type: string
      sender:
        description: 发送者ID，必填
        type: string
    required:
    - content
    - receiver
    - sender
    type: object
  models.UpdateUser:
    properties:
      bio:
        description: 个人简介
        type: string
      imageUrl:
        description: 头像URL
        type: string
      name:
        description: 用户名
        type: string
    type: object
  models.UserModel:
    properties:
      _id:
        description: 用户ID
        type: string
      bio:
        description: 个人简介
        type: string
      email:
        description: 邮箱，必填
        type: string
      followers:
        description: 关注者列表
        items:
          type: string
        type: array
      following:
        description: 关注列表
        items:
          type: string
        type: array
      imageUrl:
        description: 头像URL
        type: string
      name:
        description: 用户名
        type: string
      password:
        description: 密码，必填，最少5个字符
        minLength: 6
        type: string
    required:
    - email
    - password
    type: object
host: localhost:5000
info:
  contact: {}
  description: 这是基于 Golang Fiber 的 REST API Swagger 文档
  title: Fiber Golang Mongo Grpc Websocket 等服务
  version: "1.0"
paths:
  /chat/get-user-unreadmsg:
    get:
      consumes:
      - application/json
      description: 从 Bearer Token 中识别当前用户，返回该用户的未读消息列表与未读总数
      produces:
      - application/json
      responses:
        "200":
          description: 'messages: 未读消息列表, totalUnreadMessageCount: 未读总数'
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 获取未读消息
      tags:
      - Chat
  /chat/getmsgsbynums:
    get:
      consumes:
      - application/json
      description: 按页获取两个用户之间的聊天记录
      parameters:
      - description: 起始页码
        in: query
        name: from
        required: true
        type: integer
      - description: 第一个用户 ID
        in: query
        name: firstuid
        required: true
        type: string
      - description: 第二个用户 ID
        in: query
        name: seconduid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Message'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 分页获取聊天消息
      tags:
      - Chat
  /chat/read-msg:
    patch:
      consumes:
      - application/json
      description: 把该用户的未读消息变为已读消息
      parameters:
      - description: 其他用户ID
        in: query
        name: otheruid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 读取未读消息
      tags:
      - Chat
  /chat/sendmessage:
    post:
      consumes:
      - application/json
      description: 在两个用户之间发送消息
      parameters:
      - description: 消息发送参数
        in: body
        name: message
        required: true
        schema:
          $ref: '#/definitions/models.SendMessageM'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Message'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 发送私信
      tags:
      - Chat
  /notification/{userid}:
    get:
      consumes:
      - application/json
      description: 读取用户的通知
      parameters:
      - description: 用户ID
        in: path
        name: userid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 读取用户通知
      tags:
      - Notifications
  /notification/mark-notification-as-readed/{userid}:
    patch:
      consumes:
      - application/json
      description: 标记用户的通知为已读
      parameters:
      - description: 用户ID
        in: path
        name: userid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 标记通知为已读
      tags:
      - Notifications
  /notification/stream/{userid}:
    get:
      description: 建立 SSE 长连接，服务端在用户有新通知时推送事件
      parameters:
      - description: 用户ID
        in: path
        name: userid
        required: true
        type: string
      produces:
      - text/event-stream
      responses:
        "200":
          description: SSE stream
          schema:
            type: string
      summary: 订阅用户通知事件
      tags:
      - Notifications
  /posts:
    get:
      consumes:
      - application/json
      description: 分页获取帖子列表
      parameters:
      - description: 页码
        in: query
        name: page
        type: integer
      - description: 每页数量
        in: query
        name: limit
        type: integer
      - description: 用户 ID
        in: query
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.PostModel'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      summary: 获取帖子列表
      tags:
      - Posts
    post:
      consumes:
      - application/json
      description: 创建一条新帖子
      parameters:
      - description: 创建帖子参数
        in: body
        name: post
        required: true
        schema:
          $ref: '#/definitions/models.CreateOrUpdatePost'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.PostModel'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 创建帖子
      tags:
      - Posts
  /posts/{id}:
    delete:
      consumes:
      - application/json
      description: 按帖子 ID 删除帖子，需提供创建者的认证 Token
      parameters:
      - description: 帖子 ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 根据 ID 删除帖子
      tags:
      - Posts
    get:
      consumes:
      - application/json
      description: 根据帖子 ID 获取帖子详情
      parameters:
      - description: 帖子 ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.PostModel'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      summary: 获取单个帖子
      tags:
      - Posts
    patch:
      consumes:
      - application/json
      description: 更新指定 ID 的帖子
      parameters:
      - description: 帖子 ID
        in: path
        name: id
        required: true
        type: string
      - description: 更新帖子参数
        in: body
        name: post
        required: true
        schema:
          $ref: '#/definitions/models.CreateOrUpdatePost'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.PostModel'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 更新帖子
      tags:
      - Posts
  /posts/{id}/commentPost:
    post:
      consumes:
      - application/json
      description: 对指定帖子新增评论
      parameters:
      - description: 帖子 ID
        in: path
        name: id
        required: true
        type: string
      - description: 评论内容
        in: body
        name: post
        required: true
        schema:
          $ref: '#/definitions/models.CommentPost'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.PostModel'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 评论帖子
      tags:
      - Posts
  /posts/{id}/likePost:
    patch:
      consumes:
      - application/json
      description: 如果当前用户未点赞则添加，已点赞则移除。
      parameters:
      - description: 帖子 ObjectID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 点赞/取消点赞帖子
      tags:
      - Posts
  /posts/search:
    get:
      consumes:
      - application/json
      description: 根据搜索关键字匹配帖子和用户
      parameters:
      - description: 搜索关键词
        in: query
        name: searchQuery
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      summary: 按关键字搜索帖子与用户
      tags:
      - Posts
  /user/{id}/following:
    patch:
      consumes:
      - application/json
      description: 对目标用户执行关注或取消关注
      parameters:
      - description: 用户 ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 关注/取消关注用户
      tags:
      - Users
  /user/delete:
    delete:
      consumes:
      - application/json
      description: 删除当前登录用户
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 删除用户
      tags:
      - Users
  /user/getSug:
    get:
      consumes:
      - application/json
      description: 基于当前用户关注关系获取推荐用户
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 获取推荐用户
      tags:
      - Users
  /user/getUser/{id}:
    get:
      consumes:
      - application/json
      description: 根据用户 ID 获取用户详情
      parameters:
      - description: 用户 ID
        in: path
        name: id
        required: true
        type: string
      - description: 页码，默认 1
        in: query
        name: page
        type: integer
      - description: 每页数量，默认 10
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      summary: 按 ID 获取用户
      tags:
      - Users
  /user/signin:
    post:
      consumes:
      - application/json
      description: 通过邮箱和密码进行登录
      parameters:
      - description: 用户登录信息
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/models.LoginUser'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.UserModel'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      summary: 用户登录
      tags:
      - Authentication
  /user/signup:
    post:
      consumes:
      - application/json
      description: 通过邮箱、密码、名和姓注册新用户
      parameters:
      - description: 用户注册信息
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/models.CreateUser'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.UserModel'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      summary: 注册新用户
      tags:
      - Authentication
  /user/update:
    patch:
      consumes:
      - application/json
      description: 更新当前登录用户资料
      parameters:
      - description: 用户更新参数
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/models.UpdateUser'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.UserModel'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: 更新用户资料
      tags:
      - Users
  /validate/post:
    post:
      consumes:
      - application/json
      description: 验证帖子数据是否符合要求
      parameters:
      - description: 帖子数据
        in: body
        name: post
        required: true
        schema:
          $ref: '#/definitions/models.PostModel'
      produces:
      - application/json
      responses:
        "200":
          description: 验证通过
          schema:
            type: string
        "400":
          description: 验证失败
          schema:
            items:
              $ref: '#/definitions/models.IError'
            type: array
      summary: 验证帖子数据
      tags:
      - Validation
  /validate/user:
    post:
      consumes:
      - application/json
      description: 验证用户数据是否符合要求
      parameters:
      - description: 用户数据
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/models.UserModel'
      produces:
      - application/json
      responses:
        "200":
          description: 验证通过
          schema:
            type: string
        "400":
          description: 验证失败
          schema:
            items:
              $ref: '#/definitions/models.IError'
            type: array
      summary: 验证用户数据
      tags:
      - Validation
schemes:
- http
securityDefinitions:
  BearerAuth:
    description: 使用 Bearer 认证，格式为 "Bearer 空格 Token"
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
