version: '3'
services:
  GolangApiServer:
    image: chenmonkey438/go-app-api
    restart: unless-stopped
    container_name: GolangApiServer
    ports:
      - "5000:5000"
    networks:
      - app-network
    depends_on:
      - mongodb
  VueServer:
    image: chenmonkey438/vue-app-fe
    container_name: VueServer
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - app-network
    volumes:
      - dist:/dist
    depends_on:
      - GolangApiServer

  mongodb:
    container_name: mongodb
    image: mongo:7.0
    ports:
      - 27017:27017
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=123456
    volumes:
      - mongo-data:/usr/data/db
    networks:
      - app-network


volumes:
  dist:
    driver: local
  mongo-data:
    driver: local

networks:
  app-network:
    driver: bridge